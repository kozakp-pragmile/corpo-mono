<!DOCTYPE html>
<html lang="en">
<head>
  <title>Daily Stock Quotation</title>
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8"/>
</head>
<body>
<h1 style="color:#0a4f8a;">Daily Stock Quotation</h1>
<p>
  Dear {{name}}, here is your quotation for {{quotationDate}}.
</p>

<h2>{{paperName}} ({{paperSymbol}})</h2>

<table style="border-collapse:collapse;">
  <tr>
    <td style="padding:6px 14px 6px 0;"><strong>Open:</strong></td>
    <td>{{openPrice}}</td>
  </tr>
  <tr>
    <td style="padding:6px 14px 6px 0;"><strong>Close:</strong></td>
    <td>{{closePrice}}</td>
  </tr>
  <tr>
    <td style="padding:6px 14px 6px 0;"><strong>High:</strong></td>
    <td>{{highPrice}}</td>
  </tr>
  <tr>
    <td style="padding:6px 14px 6px 0;"><strong>Low:</strong></td>
    <td>{{lowPrice}}</td>
  </tr>
  <tr>
    <td style="padding:6px 14px 6px 0;"><strong>Volume:</strong></td>
    <td>{{volume}}</td>
  </tr>
  <tr>
    <td style="padding:6px 14px 6px 0;"><strong>Change:</strong></td>
    <td>{{changePercent}}%</td>
  </tr>
</table>

<p>
  Regards, <br/>
  <em>The Corporater team</em>
</p>
<p>
  <img alt="[Corporater logo]" src="https://corporater.com/" data-image-name="owl"/>
</p>
</body>
</html>
