<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
  <head>
    <meta charset="UTF-8" />
    <title th:remove="all">Daily Stock Quotations - Digest</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 20px;
        color: #333;
      }

      .header {
        border-bottom: 2px solid #0a4f8a;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }

      .header h1 {
        margin: 0;
        color: #0a4f8a;
      }

      table.quotations {
        width: 100%;
        border-collapse: collapse;
        margin: 20px 0;
      }

      table.quotations th,
      table.quotations td {
        border: 1px solid #ddd;
        padding: 8px 12px;
        text-align: left;
      }

      table.quotations th {
        background-color: #0a4f8a;
        color: white;
      }

      table.quotations tr:nth-child(even) {
        background-color: #f7f9fb;
      }

      .footer {
        margin-top: 30px;
        font-size: 0.9em;
        color: #666;
      }
    </style>
  </head>
  <body>
    <!--/*@thymesVar id="name" type="java.lang.String"*/-->
    <!--/*@thymesVar id="quotationDate" type="java.util.Date"*/-->
    <!--/*@thymesVar id="messages" type="java.util.List<com.corporater.pigeon.backend.shared.values.PartialMessage>" */-->
    <div class="header">
      <h1>Daily Stock Quotations - Digest</h1>
      <p>
        Dear <span th:text="${name}">Investor</span>, here is your aggregated
        digest for
        <span th:text="${#dates.format(quotationDate, 'dd MMM yyyy')}"
          >07 May 2026</span
        >.
      </p>
    </div>

    <p>
      The table below summarises the quotations of the papers you subscribed
      to.
    </p>

    <table class="quotations">
      <thead>
        <tr>
          <th>Paper</th>
          <th>Details</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="message : ${messages}">
          <td th:text="${message.subject}">SYMBOL</td>
          <td th:utext="${message.body}">Details</td>
        </tr>
      </tbody>
    </table>

    <div class="footer">
      <p>
        This is an automated notification. Please do not reply to this email.
      </p>
      <img alt="[Corporater logo]" src="cid:owl" />
    </div>
  </body>
</html>
